{% load static %}

<header class="vi-header">
    <div class="vi-header__glass">

        <!-- BOTÓN HAMBURGUESA (SOLO MÓVIL) -->
        <button class="vi-mobile-toggle d-lg-none" type="button" data-bs-toggle="collapse"
            data-bs-target="#viMobileMenu" aria-controls="viMobileMenu" aria-expanded="false"
            aria-label="Abrir menú">
            <span class="vi-mobile-toggle__bars" aria-hidden="true">
                <span class="vi-mobile-toggle__bar vi-mobile-toggle__bar--1"></span>
                <span class="vi-mobile-toggle__bar vi-mobile-toggle__bar--2"></span>
                <span class="vi-mobile-toggle__bar vi-mobile-toggle__bar--3"></span>
            </span>
        </button>

        <!-- MARCA (izquierda en desktop / centro en móvil) -->
        <a href="{% url 'base:home' %}" class="vi-brand" aria-label="Ir al inicio de Viaje Informado">
            <div class="vi-brand__logo">
                <img src="{% static 'assets/img/logo/viaje-informado-logo.png' %}" alt="Logo Viaje Informado"
                    width="58" height="58">
            </div>
            <div class="vi-brand__text">
                <span class="vi-brand__title">Viaje</span>
                <span class="vi-brand__subtitle">Informado</span>
            </div>
        </a>

        <!-- NAVEGACIÓN DESKTOP (centro absoluto) -->
        <nav class="vi-nav d-none d-lg-flex" aria-label="Navegación principal">
            <a href="{% url 'base:home' %}"
                class="vi-nav__link {% if active_nav == 'inicio' %}active{% endif %}">INICIO</a>
            <a href="#" class="vi-nav__link {% if active_nav == 'explorar' %}active{% endif %}">EXPLORAR</a>
            <a href="#" class="vi-nav__link {% if active_nav == 'gastronomia' %}active{% endif %}">GASTRONOMÍA Y
                ALOJAMIENTO</a>
            <a href="#" class="vi-nav__link {% if active_nav == 'eventos' %}active{% endif %}">EVENTOS</a>
            <a href="#" class="vi-nav__link {% if active_nav == 'planifica' %}active{% endif %}">PLANIFICA</a>
        </nav>

        <!-- ACCIONES (derecha) -->
        <div class="vi-actions">
            <a href="{% url 'base:login_visual' %}" class="vi-login-btn" aria-label="Iniciar sesión">
                <span class="vi-login-btn__icon">
                    <i class="bi bi-person" aria-hidden="true"></i>
                </span>
                <span class="vi-login-text d-none d-md-inline">INICIAR SESIÓN</span>
            </a>
        </div>

    </div><!-- /.vi-header__glass -->

    <!-- MENÚ DESPLEGABLE MÓVIL -->
    <div class="collapse vi-mobile-menu d-lg-none" id="viMobileMenu">
        <a href="{% url 'base:home' %}"
            class="vi-mobile-menu__item {% if active_nav == 'inicio' %}active{% endif %}">
            <i class="bi bi-house" aria-hidden="true"></i> INICIO
        </a>
        <a href="#" class="vi-mobile-menu__item {% if active_nav == 'explorar' %}active{% endif %}">
            <i class="bi bi-map" aria-hidden="true"></i> EXPLORAR
        </a>
        <a href="#" class="vi-mobile-menu__item {% if active_nav == 'gastronomia' %}active{% endif %}">
            <i class="bi bi-shop" aria-hidden="true"></i> GASTRONOMÍA Y ALOJAMIENTO
        </a>
        <a href="#" class="vi-mobile-menu__item {% if active_nav == 'eventos' %}active{% endif %}">
            <i class="bi bi-calendar-event" aria-hidden="true"></i> EVENTOS
        </a>
        <a href="#" class="vi-mobile-menu__item {% if active_nav == 'planifica' %}active{% endif %}">
            <i class="bi bi-journal-text" aria-hidden="true"></i> PLANIFICA
        </a>
    </div>

</header>

<script>
    (function () {
        var header = document.querySelector('.vi-header');
        if (!header) return;
        function tick() {
            header.classList.toggle('vi-header--scrolled', window.scrollY > 20);
        }
        window.addEventListener('scroll', tick, { passive: true });
        tick();
    })();
</script>
